<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>代理系统</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-50 m-0 p-0 overflow-hidden">
  <div id="root" class="h-screen w-screen"></div>

  <script type="text/babel">
    // 从全局提取 React 和 图标，避免网络拦截
    const { useState, useMemo, useRef } = React;
    const { createRoot } = ReactDOM;
    const Icons = window.lucideReact || window.lucide;
    const { 
      Home, Map, PackagePlus, BarChart3, MapPin, Navigation, 
      Gift, Package, Calendar, CheckCircle2, Store, ChevronRight, 
      Plus, Edit, Trash2, X, Settings, Download, Upload, ListOrdered 
    } = Icons;

    // --- 模拟初始数据 ---
    const INITIAL_SHOPS = [
      { id: 1, name: "老李便利店", address: "幸福路123号", owner: "李老板", phone: "13800000001", distance: "0.8km" },
      { id: 2, name: "张记烟酒店", address: "建设大道45号", owner: "张老板", phone: "13800000002", distance: "1.5km" },
      { id: 3, name: "旺旺超市", address: "人民南路88号", owner: "王老板", phone: "13800000003", distance: "2.1km" },
      { id: 4, name: "好运来便利店", address: "科技园北区C栋一楼", owner: "刘老板", phone: "13800000004", distance: "3.5km" },
    ];

    const generateMockDeliveries = () => {
      const now = new Date();
      const today = new Date(now).toISOString();
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      return [
        { id: 'mock-1', shopId: 1, date: today, normalPacks: 15, prizePacks: 2 },
        { id: 'mock-2', shopId: 2, date: today, normalPacks: 20, prizePacks: 0 },
        { id: 'mock-3', shopId: 3, date: yesterday.toISOString(), normalPacks: 10, prizePacks: 1 },
      ];
    };

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [shops, setShops] = useState(INITIAL_SHOPS);
      const [deliveries, setDeliveries] = useState(generateMockDeliveries());
      const [notification, setNotification] = useState(null);

      const showNotification = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(null), 2000);
      };

      const HomeView = () => {
        const today = new Date().toISOString().split('T')[0];
        const todayDeliveries = deliveries.filter(d => d.date.startsWith(today));
        const todayNormal = todayDeliveries.reduce((sum, d) => sum + d.normalPacks, 0);
        const todayPrize = todayDeliveries.reduce((sum, d) => sum + d.prizePacks, 0);
        const shopsVisited = new Set(todayDeliveries.map(d => d.shopId)).size;

        const [editingRecord, setEditingRecord] = useState(null);
        const [editForm, setEditForm] = useState({ normal: '', prize: '' });
        const [detailType, setDetailType] = useState(null);

        const handleOpenEdit = (record) => {
          setEditingRecord(record);
          setEditForm({
            normal: record.normalPacks.toString(),
            prize: record.prizePacks > 0 ? record.prizePacks.toString() : ''
          });
        };

        const handleSaveEdit = (e) => {
          e.preventDefault();
          if (!editForm.normal) return showNotification("请输入常规数量");
          setDeliveries(deliveries.map(d =>
            d.id === editingRecord.id ? { ...d, normalPacks: Number(editForm.normal), prizePacks: Number(editForm.prize) || 0 } : d
          ));
          setEditingRecord(null);
          showNotification("修改成功！");
        };

        return (
          <div className="p-4 pb-20 space-y-6">
            <header className="mb-6">
              <h1 className="text-2xl font-bold text-zinc-900">X.Q</h1>
              <p className="text-zinc-500 text-sm mt-1">人生没有白走的路，每一步都算数</p>
            </header>

            <div className="bg-zinc-900 rounded-2xl p-5 text-white shadow-lg">
              <div className="flex items-center justify-between mb-4">
                <span className="text-zinc-400 font-medium">今日铺货概览</span>
                <span className="bg-zinc-800 px-3 py-1 rounded-full text-xs text-zinc-300 border border-zinc-700">{today}</span>
              </div>
              <div className="flex justify-between items-end">
                <div onClick={() => setDetailType('normal')} className="cursor-pointer group">
                  <p className="text-4xl font-bold text-white">{todayNormal} <span className="text-base opacity-70">包</span></p>
                  <p className="text-zinc-400 text-sm mt-1 flex items-center gap-1">常规销售 <ChevronRight size={14}/></p>
                </div>
                <div onClick={() => setDetailType('prize')} className="text-right cursor-pointer group">
                  <p className="text-2xl font-bold text-stone-300">{todayPrize} <span className="text-sm opacity-70">包</span></p>
                  <p className="text-zinc-500 text-sm mt-1 flex items-center justify-end gap-1">兑奖回收 <ChevronRight size={14}/></p>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div className="bg-white p-4 rounded-xl shadow-sm border border-zinc-200 flex flex-col items-center">
                <div className="bg-slate-100 p-3 rounded-full text-slate-700 mb-2"><Store size={24} /></div>
                <p className="text-zinc-500 text-sm">已拜访店铺</p>
                <p className="text-xl font-bold text-zinc-900">{shopsVisited} / {shops.length}</p>
              </div>
              <div onClick={() => setActiveTab('deliver')} className="bg-white p-4 rounded-xl shadow-sm border border-zinc-200 flex flex-col items-center cursor-pointer">
                <div className="bg-zinc-100 p-3 rounded-full text-zinc-800 mb-2"><PackagePlus size={24} /></div>
                <p className="text-zinc-500 text-sm">快捷送货</p>
                <p className="text-zinc-900 font-bold text-sm mt-1">去登记 &rarr;</p>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-zinc-200 p-4">
               <h3 className="font-bold text-zinc-900 mb-3">今日区域动态</h3>
               <div className="space-y-3">
                 {todayDeliveries.map(d => {
                   const shop = shops.find(s => s.id === d.shopId);
                   return (
                     <div key={d.id} className="flex justify-between items-center border-b border-zinc-100 pb-2">
                        <div className="flex items-center gap-2">
                          <div className="w-8 h-8 rounded-full bg-zinc-100 flex items-center justify-center text-zinc-600 text-xs">
                            {shop?.name ? shop.name.substring(0, 1) : '?'}
                          </div>
                          <div>
                            <p className="text-sm font-medium text-zinc-900">{shop?.name || '未知店铺'}</p>
                            <p className="text-xs text-zinc-400">今日已送达</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-3">
                          <div className="text-right">
                            <p className="text-sm font-bold text-zinc-900">+{d.normalPacks}包</p>
                            {d.prizePacks > 0 && <p className="text-xs text-stone-500">兑 {d.prizePacks}</p>}
                          </div>
                          <button onClick={() => handleOpenEdit(d)} className="p-1.5 text-zinc-700 bg-zinc-100 rounded-md"><Edit size={14} /></button>
                        </div>
                     </div>
                   )
                 })}
                 {todayDeliveries.length === 0 && <div className="text-center py-4 text-zinc-400 text-sm">暂无记录</div>}
               </div>
            </div>

            {editingRecord && (
              <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                <div className="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl border border-zinc-200">
                  <div className="flex justify-between items-center mb-5">
                    <h3 className="font-bold text-lg">修改今日送货</h3>
                    <button onClick={() => setEditingRecord(null)} className="p-1 bg-zinc-100 rounded-full"><X size={18}/></button>
                  </div>
                  <form onSubmit={handleSaveEdit} className="space-y-4">
                    <div>
                      <label className="text-sm font-medium mb-1 flex items-center gap-1"><Package size={14}/> 常规送货</label>
                      <input type="number" value={editForm.normal} onChange={e=>setEditForm({...editForm, normal:e.target.value})} className="w-full bg-white border border-zinc-300 rounded-lg p-3"/>
                    </div>
                    <div>
                      <label className="text-sm font-medium mb-1 flex items-center gap-1"><Gift size={14}/> 兑奖回收</label>
                      <input type="number" value={editForm.prize} onChange={e=>setEditForm({...editForm, prize:e.target.value})} className="w-full bg-white border border-zinc-300 rounded-lg p-3"/>
                    </div>
                    <button type="submit" className="w-full text-white bg-zinc-900 rounded-xl py-3 mt-2">保存修改</button>
                  </form>
                </div>
              </div>
            )}
            {detailType && (
              <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                <div className="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl border border-zinc-200 max-h-[80vh] flex flex-col">
                  <div className="flex justify-between items-center mb-5 shrink-0">
                    <h3 className="font-bold text-lg flex items-center gap-2">
                      {detailType === 'normal' ? '常规销售追源' : '兑奖回收追源'}
                    </h3>
                    <button onClick={() => setDetailType(null)} className="p-1 bg-zinc-100 rounded-full"><X size={18}/></button>
                  </div>
                  <div className="overflow-y-auto flex-1 space-y-3">
                    {todayDeliveries.filter(d => detailType==='normal'?d.normalPacks>0:d.prizePacks>0).map(d => (
                      <div key={d.id} className="bg-zinc-50 p-3 rounded-xl flex justify-between items-center border border-zinc-100">
                        <span className="text-sm font-medium">{shops.find(s=>s.id===d.shopId)?.name}</span>
                        <span className="font-bold">{detailType==='normal'?`+${d.normalPacks}`:d.prizePacks} 包</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const MapView = () => {
        const [showForm, setShowForm] = useState(false);
        const [formData, setFormData] = useState({ name: '', address: '', owner: '', phone: '' });

        const handleSaveShop = () => {
          if (!formData.name) return showNotification('店铺名称不能为空');
          const finalData = { ...formData, distance: formData.distance || (Math.random()*4+0.5).toFixed(1)+'km' };
          if (formData.id) {
            setShops(shops.map(s => s.id === formData.id ? finalData : s));
            showNotification('修改成功');
          } else {
            setShops([{ ...finalData, id: Date.now() }, ...shops]);
            showNotification('新增成功');
          }
          setShowForm(false);
        };

        if (showForm) {
          return (
            <div className="h-full flex flex-col pb-20 bg-zinc-50">
              <header className="p-4 bg-white shadow-sm flex items-center justify-between border-b border-zinc-200">
                <button onClick={() => setShowForm(false)} className="p-1 bg-zinc-100 rounded-full"><X size={20}/></button>
                <h1 className="text-xl font-bold">{formData.id ? '修改店铺' : '新增店铺'}</h1>
                <button onClick={handleSaveShop} className="font-bold">保存</button>
              </header>
              <div className="p-4 space-y-4 flex-1 overflow-y-auto">
                <div className="bg-white p-5 rounded-xl border border-zinc-200 space-y-4">
                  <input type="text" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} placeholder="店铺名称 *" className="w-full bg-zinc-50 border border-zinc-300 rounded-lg p-3"/>
                  <input type="text" value={formData.address} onChange={e=>setFormData({...formData, address:e.target.value})} placeholder="详细地址" className="w-full bg-zinc-50 border border-zinc-300 rounded-lg p-3"/>
                  <input type="text" value={formData.owner} onChange={e=>setFormData({...formData, owner:e.target.value})} placeholder="老板姓名" className="w-full bg-zinc-50 border border-zinc-300 rounded-lg p-3"/>
                  <input type="tel" value={formData.phone} onChange={e=>setFormData({...formData, phone:e.target.value})} placeholder="联系电话" className="w-full bg-zinc-50 border border-zinc-300 rounded-lg p-3"/>
                  {formData.id && <button onClick={()=>{setShops(shops.filter(s=>s.id!==formData.id));setShowForm(false);}} className="w-full text-stone-700 bg-stone-100 py-3 rounded-xl mt-4 border border-stone-200"><Trash2 size={18} className="inline mr-2"/>删除店铺</button>}
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="h-full flex flex-col pb-20">
            <header className="p-4 bg-white shadow-sm border-b border-zinc-200"><h1 className="text-xl font-bold">网点导航</h1></header>
            <div className="bg-zinc-100 h-48 flex items-center justify-center border-b border-zinc-200"><MapPin size={32} className="text-zinc-800 animate-bounce"/></div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {shops.map(shop => (
                <div key={shop.id} className="bg-white p-4 rounded-xl border border-zinc-200">
                  <div className="flex justify-between items-start mb-2">
                    <h3 className="font-bold text-lg">{shop.name}</h3>
                    <button onClick={()=>{setFormData(shop);setShowForm(true);}} className="bg-zinc-100 px-2 py-1 rounded-md text-xs flex items-center gap-1"><Edit size={12}/>编辑</button>
                  </div>
                  <p className="text-sm text-zinc-500 mb-2">{shop.address}</p>
                  <div className="flex gap-2">
                    <button onClick={()=>showNotification(`导航至：${shop.address}`)} className="flex-1 bg-slate-100 text-slate-800 py-2 rounded-lg text-sm flex items-center justify-center gap-1"><Navigation size={16}/>导航</button>
                    <button onClick={()=>setActiveTab('deliver')} className="flex-1 bg-zinc-900 text-white py-2 rounded-lg text-sm flex items-center justify-center gap-1"><PackagePlus size={16}/>去送货</button>
                  </div>
                </div>
              ))}
              <button onClick={()=>{setFormData({name:'', address:'', owner:'', phone:''});setShowForm(true);}} className="w-full bg-zinc-50 border-2 border-dashed border-zinc-300 py-4 rounded-xl flex justify-center items-center gap-2 mt-2"><Plus size={20}/>新增店铺</button>
            </div>
          </div>
        );
      };

      const DeliverView = () => {
        const [showAddForm, setShowAddForm] = useState(false);
        const [editingId, setEditingId] = useState(null);
        const [form, setForm] = useState({ shop: '', normal: '', prize: '', date: '' });

        const openForm = (d = null) => {
          setEditingId(d ? d.id : null);
          setForm(d ? { shop: d.shopId, normal: d.normalPacks, prize: d.prizePacks||'', date: d.date.split('T')[0] } 
                    : { shop: shops[0]?.id||'', normal: '', prize: '', date: new Date().toISOString().split('T')[0] });
          setShowAddForm(true);
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          if(!form.normal) return showNotification("请输入常规数量");
          const data = { shopId: Number(form.shop), date: `${form.date}T12:00:00Z`, normalPacks: Number(form.normal), prizePacks: Number(form.prize)||0 };
          if (editingId) setDeliveries(deliveries.map(d => d.id === editingId ? { ...d, ...data } : d));
          else setDeliveries([{ id: Date.now().toString(), ...data }, ...deliveries]);
          setShowAddForm(false);
          showNotification("保存成功！");
        };

        if (showAddForm) {
          return (
            <div className="h-full flex flex-col pb-20 bg-zinc-50">
              <header className="p-4 bg-white shadow-sm flex items-center justify-between border-b border-zinc-200">
                <button onClick={() => setShowAddForm(false)} className="p-1 bg-zinc-100 rounded-full"><X size={20}/></button>
                <h1 className="text-xl font-bold">{editingId ? '修改记录' : '新增送货'}</h1>
                <div className="w-6"></div>
              </header>
              <div className="flex-1 overflow-y-auto p-4">
                <form onSubmit={handleSubmit} className="space-y-4">
                  <input type="date" value={form.date} onChange={e=>setForm({...form, date:e.target.value})} className="w-full bg-white border border-zinc-300 rounded-lg p-3"/>
                  <select value={form.shop} onChange={e=>setForm({...form, shop:e.target.value})} className="w-full bg-white border border-zinc-300 rounded-lg p-3">
                    {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                  <input type="number" placeholder="常规送货数量" value={form.normal} onChange={e=>setForm({...form, normal:e.target.value})} className="w-full bg-white border border-zinc-300 rounded-lg p-3"/>
                  <input type="number" placeholder="兑奖回收数量 (选填)" value={form.prize} onChange={e=>setForm({...form, prize:e.target.value})} className="w-full bg-white border border-zinc-300 rounded-lg p-3"/>
                  <button type="submit" className="w-full text-white bg-zinc-900 rounded-xl py-4 mt-2">确认提交</button>
                  {editingId && <button type="button" onClick={()=>{setDeliveries(deliveries.filter(d=>d.id!==editingId));setShowAddForm(false);}} className="w-full bg-stone-100 text-stone-700 py-3 rounded-xl border border-stone-200 mt-4">删除记录</button>}
                </form>
              </div>
            </div>
          );
        }

        return (
          <div className="h-full flex flex-col pb-20">
            <header className="p-4 bg-white shadow-sm flex justify-between items-center border-b border-zinc-200">
              <h1 className="text-xl font-bold">送货记录</h1>
              <button onClick={()=>openForm()} className="bg-zinc-900 text-white p-2 rounded-xl"><Plus size={24}/></button>
            </header>
            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {deliveries.map(d => (
                <div key={d.id} className="bg-white p-4 rounded-xl border border-zinc-200">
                  <div className="flex justify-between items-center mb-3">
                    <span className="font-bold">{shops.find(s=>s.id===d.shopId)?.name}</span>
                    <div className="flex items-center gap-2">
                      <span className="text-xs bg-zinc-100 px-2 py-1 rounded-md">{d.date.split('T')[0]}</span>
                      <button onClick={()=>openForm(d)} className="bg-zinc-100 p-1.5 rounded-md"><Edit size={12}/></button>
                    </div>
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1 bg-zinc-50 border border-zinc-100 rounded-lg p-2 text-center"><p className="text-xs text-zinc-600">常规</p><p className="font-bold">{d.normalPacks}</p></div>
                    <div className="flex-1 bg-stone-50 border border-stone-100 rounded-lg p-2 text-center"><p className="text-xs text-stone-600">兑奖</p><p className="font-bold">{d.prizePacks}</p></div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const StatsView = () => {
        const [timeRange, setTimeRange] = useState('week');
        const [statShopId, setStatShopId] = useState('all');
        const [showSettings, setShowSettings] = useState(false);
        const [detailType, setDetailType] = useState(null);
        const [tracedShop, setTracedShop] = useState(null);
        const [showAllRecords, setShowAllRecords] = useState(false);
        const fileRef = useRef(null);

        const handleExport = () => {
          const blob = new Blob([JSON.stringify({ shops, deliveries })], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'data.json'; a.click();
          showNotification("导出成功"); setShowSettings(false);
        };

        const handleImport = (e) => {
          try {
            const reader = new FileReader();
            reader.onload = (ev) => {
              const data = JSON.parse(ev.target.result);
              setShops(data.shops); setDeliveries(data.deliveries);
              showNotification("导入成功"); setShowSettings(false);
            };
            reader.readAsText(e.target.files[0]);
          } catch(err) { showNotification("导入失败"); }
        };

        const stats = useMemo(() => {
          let fd = statShopId==='all' ? deliveries : deliveries.filter(d=>d.shopId===Number(statShopId));
          const now = new Date();
          fd = fd.filter(d => {
            const dt = new Date(d.date);
            if(timeRange==='week') return Math.abs(now-dt)/(1000*3600*24) <= 7;
            if(timeRange==='month') return dt.getMonth()===now.getMonth();
            return dt.getFullYear()===now.getFullYear();
          });
          const shopTotals = {};
          fd.forEach(d => {
            if(!shopTotals[d.shopId]) shopTotals[d.shopId] = {normal:0, prize:0};
            shopTotals[d.shopId].normal += d.normalPacks;
            shopTotals[d.shopId].prize += d.prizePacks;
          });
          const list = Object.keys(shopTotals).map(id => ({ shop: shops.find(s=>s.id===Number(id))||{name:'未知'}, ...shopTotals[id] })).sort((a,b)=>b.normal-a.normal);
          return { n: fd.reduce((s,d)=>s+d.normalPacks,0), p: fd.reduce((s,d)=>s+d.prizePacks,0), list, fd, count: fd.length };
        }, [deliveries, timeRange, statShopId]);

        return (
          <div className="p-4 pb-20 h-full flex flex-col">
            <header className="mb-4 flex justify-between items-center">
              <h1 className="text-xl font-bold">业务总结</h1>
              <button onClick={()=>setShowSettings(true)} className="p-2 bg-zinc-100 rounded-full"><Settings size={20}/></button>
            </header>
            
            <div className="flex bg-zinc-100 p-1 rounded-lg mb-3">
              {['week','month','year'].map(t=><button key={t} onClick={()=>setTimeRange(t)} className={`flex-1 py-2 text-sm rounded-md ${timeRange===t?'bg-white shadow':''}`}>{t==='week'?'周':t==='month'?'月':'年'}总结</button>)}
            </div>
            <select value={statShopId} onChange={e=>setStatShopId(e.target.value)} className="w-full bg-white border border-zinc-300 rounded-lg p-2.5 mb-6">
              <option value="all">全区域数据</option>
              {shops.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select>

            <div className="bg-gradient-to-br from-zinc-800 to-stone-900 rounded-2xl p-5 text-white mb-6">
              <div className="flex gap-4 divide-x divide-zinc-600">
                <div onClick={()=>setDetailType('normal')} className="flex-1 cursor-pointer"><p className="text-xs text-zinc-400 mb-1">常规</p><p className="text-3xl font-bold">{stats.n}</p></div>
                <div onClick={()=>setDetailType('prize')} className="flex-1 pl-4 cursor-pointer"><p className="text-xs text-zinc-400 mb-1">兑奖</p><p className="text-3xl font-bold">{stats.p}</p></div>
              </div>
              <div className="mt-4 pt-3 border-t border-zinc-700 text-xs text-zinc-400 cursor-pointer" onClick={()=>setShowAllRecords(true)}>查看 {stats.count} 次送货流水 &rarr;</div>
            </div>

            <div className="flex-1 space-y-3">
              {stats.list.map((item, i) => (
                <div key={i} onClick={()=>setTracedShop(item.shop)} className="bg-white p-3 rounded-xl border border-zinc-200 flex justify-between items-center cursor-pointer">
                  <span className="font-medium text-sm">{item.shop.name}</span>
                  <div className="text-xs text-zinc-500"><span className="mr-2">常:{item.normal}</span> <span>兑:{item.prize}</span></div>
                </div>
              ))}
            </div>

            {showSettings && (
               <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                 <div className="bg-white p-5 rounded-2xl w-full max-w-xs space-y-3">
                   <div className="flex justify-between items-center"><h3 className="font-bold">数据管理</h3><X onClick={()=>setShowSettings(false)}/></div>
                   <button onClick={handleExport} className="w-full bg-zinc-900 text-white py-3 rounded-xl">导出备份 (JSON)</button>
                   <button onClick={()=>fileRef.current.click()} className="w-full bg-zinc-50 border border-zinc-300 py-3 rounded-xl">导入数据</button>
                   <input type="file" ref={fileRef} onChange={handleImport} className="hidden"/>
                 </div>
               </div>
            )}
            {detailType && (
               <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                 <div className="bg-white p-5 rounded-2xl w-full max-w-xs max-h-[80vh] overflow-auto">
                   <div className="flex justify-between items-center mb-4"><h3 className="font-bold">合并汇总</h3><X onClick={()=>setDetailType(null)}/></div>
                   {stats.list.filter(i=>detailType==='normal'?i.normal>0:i.prize>0).map((i,idx)=><div key={idx} className="flex justify-between py-2 border-b"><span>{i.shop.name}</span><span className="font-bold">{detailType==='normal'?i.normal:i.prize}包</span></div>)}
                 </div>
               </div>
            )}
            {tracedShop && (
               <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                 <div className="bg-white p-5 rounded-2xl w-full max-w-xs max-h-[80vh] overflow-auto">
                   <div className="flex justify-between items-center mb-4"><h3 className="font-bold">{tracedShop.name} 流水</h3><X onClick={()=>setTracedShop(null)}/></div>
                   {stats.fd.filter(d=>d.shopId===tracedShop.id).map(d=><div key={d.id} className="py-2 border-b text-sm"><span>{d.date.split('T')[0]}</span> <span className="ml-2 font-bold">+{d.normalPacks} 常</span> <span className="ml-2">+{d.prizePacks} 兑</span></div>)}
                 </div>
               </div>
            )}
            {showAllRecords && (
               <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4">
                 <div className="bg-white p-5 rounded-2xl w-full max-w-xs max-h-[80vh] overflow-auto">
                   <div className="flex justify-between items-center mb-4"><h3 className="font-bold">所有流水</h3><X onClick={()=>setShowAllRecords(false)}/></div>
                   {stats.fd.map(d=><div key={d.id} className="py-2 border-b text-sm"><span className="font-medium block">{shops.find(s=>s.id===d.shopId)?.name}</span><div className="text-zinc-500 mt-1"><span>{d.date.split('T')[0]}</span> <span className="ml-2 font-bold text-black">+{d.normalPacks}</span> <span className="ml-2">+{d.prizePacks}</span></div></div>)}
                 </div>
               </div>
            )}
          </div>
        );
      };

      const navs = [{id:'home',icon:Home,t:'首页'}, {id:'map',icon:Map,t:'网点'}, {id:'deliver',icon:PackagePlus,t:'送货'}, {id:'stats',icon:BarChart3,t:'统计'}];

      return (
        <div className="max-w-md mx-auto h-full bg-zinc-50 flex flex-col relative font-sans text-zinc-800">
          {notification && <div className="absolute top-4 left-1/2 -translate-x-1/2 z-50 bg-zinc-900 text-white px-4 py-2 rounded-full text-sm">{notification}</div>}
          <div className="flex-1 overflow-y-auto">
            {activeTab === 'home' && <HomeView />}
            {activeTab === 'map' && <MapView />}
            {activeTab === 'deliver' && <DeliverView />}
            {activeTab === 'stats' && <StatsView />}
          </div>
          <nav className="bg-white border-t border-zinc-200 h-16 flex justify-around">
            {navs.map(n => {
              const Icon = n.icon;
              return <button key={n.id} onClick={()=>setActiveTab(n.id)} className={`flex-1 flex flex-col items-center justify-center ${activeTab===n.id?'text-zinc-900':'text-zinc-400'}`}><Icon size={22}/><span className="text-[10px] mt-1">{n.t}</span></button>
            })}
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
